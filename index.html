<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LivrariaFront</title>
</head>
<body>   
    <div id="cards"></div>

    <form action="" id="autorForm">
    <h1>Livraria Digital</h1>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <div class="nome">
        <label for="nomeID">Nome:</label>
        <input type="text" id="nome" name="Nome"> 
    </div>
    <div class="biografia">
        <label for="biografiaID">Biografia:</label>
        <input type="text" id="biografia" name="Biografia">
    </div>
    <div class="porcentagem">
        <label for="porcentagemID">Porcentagem De Royalties:</label>
        <input type="number" id="porcentagem" name="porcentagemDeRoyalties">
    </div>
    <div class="endereco">
        <label for="enderecoID">Endereço Pessoal: </label>
        <input type="text" id="endereco" name="Endereço Pessoal">
    </div>
    <select name="autor" id="autor" required></select>
    <button type="submit">Adicionar Autor</button>
    </form>
</body>
</html>
