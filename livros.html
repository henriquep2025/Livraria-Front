<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through The Wire</title>
</head>
<body>
    <div id="cards"></div>
    <form action="" id="livroForm">
    <h1>Livraria Digital</h1>
    <script src="script2.js"></script>
    <link rel="stylesheet" href="style2.css">
    <div class="titulo">
        <label for="tituloID">Titulo:</label>
        <input type="text" id="titulo" name="Titulo"> 
    </div>
    <div class="codigoISBN">
        <label for="codigoISBN">CódigoISBN:</label>
        <input type="number" id="codigoISBN" name="CódigoISBN">
    </div>
    <div class="preco">
        <label for="precoID">Preço:</label>
        <input type="number" id="preco" name="Preco">
    </div>
    <div class="autor">
        <label for="autorID">AutorId: </label>
        <input type="number" id="autorid" name="AutorID">
    </div>
    <button type="submit">Adicionar Livro</button>
    </form>
    <script src="script.js"></script>
</body>
</html>
